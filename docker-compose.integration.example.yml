name: norlab-integrated

services:
  norlab-backend:
    build:
      context: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  norlab-frontend:
    build:
      context: ./frontend
    ports:
      - "4173:80"
    volumes:
      - ./frontend/nginx.backend.conf.example:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      norlab-backend:
        condition: service_healthy
    restart: unless-stopped
